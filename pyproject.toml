[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.black]
line-length = 79

[tool.pytest.ini_options]
testpaths = "tests"
addopts = "-vvvv --doctest-modules --durations 2"
console_output_style = "progress-even-when-capture-no"
filterwarnings = [
    "ignore::DeprecationWarning:jupyter_client.*",
]

[project]
name = "gcmotion"
version = "0.1.0"
authors = [
  { name="George Tsiamasiotis", email="gtsiamasiotis@gmail.com" },
]
description = "Package for Guiding Center Motion calculations"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy~=2.1",
  "matplotlib~=3.9",
  "pyqt6",
  "scipy~=1.14",
  #"vpython~=7.6",
  "tqdm~=4.66",
  "loguru~=0.7",
  "pint~=0.24",
  "termcolor~=2.5",
  "xarray~=2025.1.2",
  "netcdf4~=1.7",
]


classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/PlasmaPhy/gcmotion"
Issues = "https://github.com/PlasmaPhy/gcmotion/issues"
